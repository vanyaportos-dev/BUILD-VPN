<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Технические работы — BUILD VPN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 30%, #3B1256 0%, #1E0A2A 40%, #0B0410 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: #fff;
    }

    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      will-change: transform;
      opacity: 0.12;
    }

    .blob-1 {
      width: 500px; height: 500px;
      top: -100px; left: -150px;
      box-shadow: 0 0 180px 80px #F472B6;
      animation: blobMove1 35s ease-in-out infinite;
    }

    .blob-2 {
      width: 600px; height: 600px;
      top: 40%; right: -200px;
      box-shadow: 0 0 200px 100px #A855F7;
      animation: blobMove2 35s ease-in-out infinite;
    }

    .blob-3 {
      width: 400px; height: 400px;
      bottom: -100px; left: 30%;
      box-shadow: 0 0 150px 60px #3B82F6;
      animation: blobMove3 35s ease-in-out infinite;
    }

    @keyframes blobMove1 {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(60px, 80px); }
    }
    @keyframes blobMove2 {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(-80px, -60px); }
    }
    @keyframes blobMove3 {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(40px, -50px); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
    }

    .maintenance-icon {
      font-size: 80px;
      color: #A855F7;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #A855F7, #EC4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #D1D5DB;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(168,85,247,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-fill {
      width: 65%;
      height: 100%;
      background: linear-gradient(90deg, #A855F7, #EC4899);
      border-radius: 10px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .social-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 32px;
    }

    .social-links a {
      color: #A1A1AA;
      font-size: 28px;
      transition: all 0.2s ease;
    }

    .social-links a:hover {
      color: #A855F7;
      transform: translateY(-3px);
    }

    .telegram-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #A855F7, #EC4899);
      color: #fff;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 16px;
      transition: all 0.2s ease;
    }

    .telegram-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(168,85,247,0.5);
    }

    .note {
      font-size: 12px;
      color: #64748B;
      margin-top: 32px;
    }
  </style>
</head>
<body>

<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="container">
  <div class="maintenance-icon">
    <i class="fa-solid fa-wrench"></i>
  </div>
  <h1>Технические работы</h1>
  <p>
    Сайт временно недоступен.<br>
    Мы обновляем систему, чтобы сделать её ещё лучше.
  </p>
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
  <p style="font-size: 14px; margin-bottom: 16px;">
    <i class="fa-regular fa-clock"></i> Ориентировочное время: 15–30 минут
  </p>
  <a href="https://t.me/buildvpn_io" target="_blank" class="telegram-btn">
    <i class="fa-brands fa-telegram"></i> Следить за обновлениями
  </a>
  <div class="social-links">
    <a href="https://t.me/buildvpn_io" target="_blank"><i class="fa-brands fa-telegram"></i></a>
  </div>
  <p class="note">
    По всем вопросам пишите в Telegram-канал @buildvpn_io
  </p>
</div>

</body>
</html>
