<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Восстановление BUILD ID — BUILD VPN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<main>
  <div class="container" style="max-width:540px;padding-top:60px;padding-bottom:100px">

    <div class="page-header" style="padding:0 0 32px">
      <div class="feature-icon" style="margin-bottom:20px"><i class="fa-solid fa-key"></i></div>
      <h1 style="font-size:clamp(26px,5vw,40px);font-weight:800;margin-bottom:12px">
        Восстановление <span class="grad">BUILD ID</span>
      </h1>
      <p style="color:var(--text-sub);font-size:15px;line-height:1.7">
        Введите резервный код, который вы сохранили при активации.
      </p>
    </div>

    <div class="card" style="padding:32px" id="recover-form">
      <div class="bid-form-group">
        <label class="bid-label"><i class="fa-solid fa-shield"></i> Резервный код</label>
        <input type="text" id="backup-code" class="bid-input" style="text-align:center;font-size:20px;font-weight:800;letter-spacing:4px;text-transform:uppercase" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off">
        <p class="bid-hint">Формат: XXXX-XXXX (8 символов)</p>
      </div>

      <button class="btn btn-primary" id="recover-btn" style="width:100%;justify-content:center;margin-top:8px">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Восстановить
      </button>
      <div id="recover-result" style="display:none;margin-top:20px"></div>
    </div>

  </div>
</main>

<nav class="bottom-nav">
  <a href="/servers" class="nav-item" id="nav-servers"><i class="fa-solid fa-server"></i><span>Серверы</span></a>
  <a href="/news" class="nav-item" id="nav-news"><i class="fa-solid fa-newspaper"></i><span>Новости</span></a>
  <a href="/#faq" class="nav-item"><i class="fa-solid fa-circle-question"></i><span>FAQ</span></a>
  <a href="/dashboard.html" class="nav-item" id="nav-dashboard"><i class="fa-solid fa-user"></i><span>Профиль</span></a>
  <button class="nav-item" id="nav-speed"><i class="fa-solid fa-gauge-high"></i><span>Speedtest</span></button>
  <a href="/blog" class="nav-item" id="nav-blog"><i class="fa-solid fa-pen-nib"></i><span>Блог</span></a>
</nav>

<div class="modal-backdrop" id="speed-modal">
  <div class="modal">
    <button class="modal-close" id="speed-close"><i class="fa-solid fa-xmark"></i></button>
    <h2><span class="grad">Тест скорости</span></h2>
    <p class="sub">Проверка качества подключения через BUILD VPN</p>
    <div class="progress-bar-wrap"><div class="progress-bar" id="speed-bar"></div></div>
    <div class="speed-result"><i class="fa-solid fa-satellite-dish speed-icon ping"></i><div><div class="speed-label">Пинг</div><div class="speed-value" id="res-ping">—</div></div></div>
    <div class="speed-result"><i class="fa-solid fa-arrow-down speed-icon dl"></i><div><div class="speed-label">Загрузка</div><div class="speed-value" id="res-dl">—</div></div></div>
    <div class="speed-result"><i class="fa-solid fa-arrow-up speed-icon ul"></i><div><div class="speed-label">Отдача</div><div class="speed-value" id="res-ul">—</div></div></div>
    <button class="btn btn-primary" id="run-speed" style="width:100%;justify-content:center;margin-top:20px"><i class="fa-solid fa-rotate"></i> Запустить снова</button>
    <p class="modal-footer-note">Технология тестирования предоставлена BUILD VPN</p>
  </div>
</div>

<script>
document.getElementById('backup-code').addEventListener('input', function() {
  this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
});

document.getElementById('recover-btn').addEventListener('click', async () => {
  const btn = document.getElementById('recover-btn');
  const code = document.getElementById('backup-code').value.trim();
  const resultDiv = document.getElementById('recover-result');

  if (!code || code.length < 8) {
    resultDiv.style.display = 'block';
    resultDiv.style.cssText = 'background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:14px 18px;font-size:14px;color:var(--text-sub);';
    resultDiv.textContent = 'Введите резервный код (формат XXXX-XXXX)';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Проверяем...';

  try {
    const r = await fetch('/api/recover-by-backup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ backupCode: code })
    });
    const data = await r.json();

    if (r.ok) {
      resultDiv.style.cssText = 'background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.3);border-radius:12px;padding:20px 22px;text-align:center';
      resultDiv.innerHTML = '<i class="fa-solid fa-check-circle" style="font-size:32px;color:#4ADE80;display:block;margin-bottom:12px"></i>' +
        '<p style="font-size:16px;font-weight:600;color:var(--text-main);margin-bottom:8px">Ваш BUILD ID код:</p>' +
        '<div class="bid-code-box" style="margin:16px 0">' + data.code + '</div>' +
        '<a href="/dashboard.html" class="btn btn-primary" style="display:inline-flex;justify-content:center;margin-top:12px">' +
        '<i class="fa-solid fa-arrow-right-to-bracket"></i> Войти в профиль</a>';
    } else {
      resultDiv.style.cssText = 'background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:14px 18px;font-size:14px;color:var(--text-sub);';
      resultDiv.textContent = data.error || 'Неверный резервный код';
    }
  } catch (e) {
    resultDiv.style.cssText = 'background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:14px 18px;font-size:14px;color:var(--text-sub);';
    resultDiv.textContent = 'Ошибка сети. Попробуй снова.';
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Восстановить';
  resultDiv.style.display = 'block';
});
</script>
<script src="/script.js"></script>
</body>
  </html>
