  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .crane-animation {
      width: 250px;
      height: 250px;
      margin: 20px auto;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .crane {
      font-size: 80px;
      color: var(--accent-purple);
      animation: craneMove 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.5));
    }
    
    .crane-arm {
      width: 120px;
      height: 6px;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink));
      border-radius: 3px;
      margin: -10px auto 0;
      animation: armSwing 4s ease-in-out infinite;
      transform-origin: left center;
    }
    
    .crane-hook {
      width: 4px;
      height: 40px;
      background: var(--accent-glow);
      margin-left: 100px;
      animation: hookBounce 2s ease-in-out infinite;
      position: relative;
    }
    
    .crane-hook::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: -6px;
      width: 16px;
      height: 8px;
      border: 3px solid var(--accent-glow);
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    
    .crane-load {
      width: 20px;
      height: 20px;
      background: var(--accent-pink);
      border-radius: 4px;
      margin-left: 92px;
      margin-top: -5px;
      animation: loadFloat 2s ease-in-out infinite 0.3s;
      opacity: 0.8;
    }
    
    .dust {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    
    .dust span {
      width: 6px;
      height: 6px;
      background: var(--accent-purple);
      border-radius: 50%;
      opacity: 0.4;
      animation: dustFloat 2.5s ease-in-out infinite;
    }
    
    .dust span:nth-child(2) { animation-delay: 0.4s; width: 8px; height: 8px; }
    .dust span:nth-child(3) { animation-delay: 0.8s; width: 5px; height: 5px; }
    .dust span:nth-child(4) { animation-delay: 1.2s; }
    
    @keyframes craneMove {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes armSwing {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
    }
    
    @keyframes hookBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(15px); }
    }
    
    @keyframes loadFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(15px) rotate(5deg); }
    }
    
    @keyframes dustFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
      50% { transform: translateY(-20px) scale(1.5); opacity: 0.6; }
    }
  </style>
</head>
