<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ответ на обращение — BUILD VPN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<main>
  <div class="container" style="max-width:800px;padding-top:60px;padding-bottom:100px">

    <div id="admin-auth" style="text-align:center;padding:60px 20px">
      <div class="card" style="max-width:400px;margin:0 auto;padding:32px">
        <div class="feature-icon" style="margin:0 auto 20px"><i class="fa-solid fa-lock"></i></div>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Вход в админку</h2>
        <p style="color:var(--text-sub);margin-bottom:24px">Введите пароль администратора</p>
        <input type="password" id="admin-pwd" class="bid-input" placeholder="Пароль" style="margin-bottom:16px">
        <button class="btn btn-primary" id="admin-login" style="width:100%;justify-content:center">Войти</button>
        <div id="admin-error" style="display:none;margin-top:16px;color:#FC8181"></div>
      </div>
    </div>

    <div id="admin-panel" style="display:none">
      <div id="ticket-content">
        <div style="text-align:center;padding:40px;color:var(--text-muted)">
          <i class="fa-solid fa-spinner fa-spin" style="font-size:24px;margin-bottom:12px;display:block"></i>
          Загрузка...
        </div>
      </div>
    </div>

  </div>
</main>

<script>
let adminPassword = '';

document.getElementById('admin-login').addEventListener('click', async () => {
  const pwd = document.getElementById('admin-pwd').value;
  const errorDiv = document.getElementById('admin-error');
  
  if (!pwd) {
    errorDiv.textContent = 'Введите пароль';
    errorDiv.style.display = 'block';
    return;
  }
  
  const btn = document.getElementById('admin-login');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Проверка...';
  
  try {
    const res = await fetch('/api/admin/get-tickets', {
      headers: { 'x-admin-password': pwd }
    });
    
    if (res.ok) {
      adminPassword = pwd;
      document.getElementById('admin-auth').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      await loadTicket();
    } else {
      errorDiv.textContent = 'Неверный пароль';
      errorDiv.style.display = 'block';
    }
  } catch (e) {
    errorDiv.textContent = 'Ошибка сети';
    errorDiv.style.display = 'block';
  }
  
  btn.disabled = false;
  btn.innerHTML = 'Войти';
});

async function loadTicket() {
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  
  if (!id) {
    window.location.href = '/admin/tickets.html';
    return;
  }
  
  const container = document.getElementById('ticket-content');
  
  try {
    const res = await fetch(`/api/get-ticket?id=${id}`, {
      headers: { 'x-admin-password': adminPassword }
    });
    
    if (!res.ok) {
      if (res.status === 401 || res.status === 403) {
        window.location.href = '/admin/tickets.html';
        return;
      }
      throw new Error('Ошибка загрузки');
    }
    
    const ticket = await res.json();
    const statusMap = {
      'open': { text: 'Открыт', color: '#EAB308' },
      'in_progress': { text: 'В работе', color: '#60A5FA' },
      'closed': { text: 'Закрыт', color: '#4ADE80' }
    };
    const status = statusMap[ticket.status] || statusMap.open;
    const date = new Date(ticket.createdAt).toLocaleString('ru-RU');
    
    let messagesHtml = '';
    for (const msg of ticket.messages) {
      const isAdmin = msg.from === 'admin';
      const time = new Date(msg.createdAt).toLocaleString('ru-RU');
      messagesHtml += `
        <div style="display:flex;${isAdmin ? 'justify-content:flex-end' : 'justify-content:flex-start'};margin-bottom:16px">
          <div style="max-width:70%;background:${isAdmin ? 'rgba(74,222,128,0.1)' : 'rgba(168,85,247,0.1)'};border-radius:20px;padding:12px 16px">
            <div style="font-size:12px;color:${isAdmin ? '#4ADE80' : '#A855F7'};margin-bottom:4px">
              ${isAdmin ? '🛡️ Администратор' : '👤 ' + escapeHtml(ticket.userNick)}
            </div>
            <div style="font-size:14px;color:var(--text-main);word-break:break-word">${escapeHtml(msg.text)}</div>
            <div style="font-size:10px;color:var(--text-muted);margin-top:6px">${time}</div>
          </div>
        </div>
      `;
    }
    
    container.innerHTML = `
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:24px">
        <div style="padding:24px;border-bottom:1px solid rgba(168,85,247,0.1)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:12px">
            <h1 style="font-size:22px;font-weight:800">${escapeHtml(ticket.topic)}</h1>
            <span style="background:${status.color}22;border:1px solid ${status.color}55;color:${status.color};font-size:12px;font-weight:700;padding:4px 12px;border-radius:50px">${status.text}</span>
          </div>
          <div style="font-size:13px;color:var(--text-muted)">
            <i class="fa-regular fa-user"></i> ${escapeHtml(ticket.userNick)} (@${escapeHtml(ticket.userId)})
          </div>
          <div style="font-size:13px;color:var(--text-muted);margin-top:4px">
            <i class="fa-regular fa-calendar"></i> Создано: ${date}
          </div>
        </div>
        
        <div style="padding:24px" id="messages-container">
          ${messagesHtml}
        </div>
        
        ${ticket.status !== 'closed' ? `
        <div style="padding:24px;border-top:1px solid rgba(168,85,247,0.1)">
          <div class="bid-form-group">
            <label class="bid-label"><i class="fa-solid fa-reply"></i> Ответ</label>
            <textarea id="reply-input" class="bid-input" rows="3" placeholder="Введите ответ..."></textarea>
          </div>
          <button class="btn btn-primary" id="send-reply-btn" style="width:100%;justify-content:center;margin-top:8px">
            <i class="fa-solid fa-paper-plane"></i> Отправить
          </button>
          <div id="reply-error" style="display:none;margin-top:12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:12px;font-size:13px;color:#FC8181"></div>
        </div>
        ` : `
        <div style="padding:24px;text-align:center;border-top:1px solid rgba(168,85,247,0.1)">
          <span style="color:var(--text-muted)"><i class="fa-solid fa-lock"></i> Обращение закрыто</span>
        </div>
        `}
      </div>
      <a href="/admin/tickets.html" class="btn btn-outline" style="justify-content:center;display:flex">
        <i class="fa-solid fa-arrow-left"></i> Назад к списку
      </a>
    `;
    
    if (ticket.status !== 'closed') {
      document.getElementById('send-reply-btn').addEventListener('click', async () => {
        await sendReply(ticket.id);
      });
    }
    
  } catch (e) {
    container.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:#FC8181">Ошибка загрузки обращения</div>';
  }
}

async function sendReply(ticketId) {
  const message = document.getElementById('reply-input').value.trim();
  const errorDiv = document.getElementById('reply-error');
  
  if (!message) {
    errorDiv.textContent = 'Введите сообщение';
    errorDiv.style.display = 'block';
    return;
  }
  
  const btn = document.getElementById('send-reply-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Отправка...';
  
  try {
    const res = await fetch('/api/admin/reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ ticketId, message })
    });
    
    if (res.ok) {
      window.location.reload();
    } else {
      const data = await res.json();
      errorDiv.textContent = data.error || 'Ошибка отправки';
      errorDiv.style.display = 'block';
    }
  } catch (e) {
    errorDiv.textContent = 'Ошибка сети';
    errorDiv.style.display = 'block';
  }
  
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Отправить';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}
</script>
<script src="/script.js"></script>
</body>
</html>
